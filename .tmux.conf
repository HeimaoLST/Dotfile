# 1. 设置主前缀为 Ctrl+a
set -g prefix C-a

# 2. 解除默认的 Ctrl+b 绑定，释放该组合键
unbind C-b

# 3. 允许按下两次 Ctrl+a 时，将该信号发送到当前运行的程序（如 Bash/Vim）
bind C-a send-prefix

# 4. 使用 zsh 作为默认 shell
set-option -g default-shell /usr/bin/zsh
set-option -g default-command /usr/bin/zsh

# 5. 启用 256 色和真彩色支持
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ============================================================
# Rose Pine Dawn 浅色主题 (pink dawn)
# ============================================================
# 色板参考：
#   base:    #faf4ed  (底色 - 米白)
#   surface: #fffaf3  (表面)
#   overlay: #f2e9e1  (叠层)
#   muted:   #9893a5  (柔灰)
#   subtle:  #797593  (次要文字)
#   text:    #575279  (主要文字 - 深紫)
#   love:    #b4637a  (粉红 - 强调色)
#   gold:    #ea9d34  (金色)
#   rose:    #d7827e  (玫瑰粉)
#   pine:    #286983  (松绿蓝)
#   foam:    #56949f  (泡沫青)
#   iris:    #907aa9  (鸢尾紫)

# 状态栏位置与刷新
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# 状态栏整体
set -g status-style "bg=#faf4ed,fg=#575279"

# 左侧：会话名
set -g status-left-length 40
set -g status-left "#[bg=#b4637a,fg=#faf4ed,bold]  #S #[bg=#faf4ed,fg=#b4637a]"

# 右侧：时间和主机
set -g status-right-length 80
set -g status-right "#[fg=#d7827e]#[bg=#d7827e,fg=#faf4ed] %Y-%m-%d #[fg=#b4637a,bg=#d7827e]#[bg=#b4637a,fg=#faf4ed,bold] %H:%M #[fg=#907aa9,bg=#b4637a]#[bg=#907aa9,fg=#faf4ed,bold] #h "

# 窗口标签 - 未激活
set -g window-status-format "#[fg=#797593,bg=#faf4ed]  #I:#W  "
set -g window-status-style "bg=#faf4ed,fg=#797593"

# 窗口标签 - 激活
set -g window-status-current-format "#[fg=#faf4ed,bg=#b4637a]#[bg=#b4637a,fg=#faf4ed,bold] #I:#W #[fg=#b4637a,bg=#faf4ed]"
set -g window-status-current-style "bold"

# 窗口标签 - 有活动
set -g window-status-activity-style "fg=#ea9d34,bg=#faf4ed"

# 窗格边框
set -g pane-border-style "fg=#f2e9e1"
set -g pane-active-border-style "fg=#b4637a"

# 消息提示样式
set -g message-style "bg=#b4637a,fg=#faf4ed,bold"
set -g message-command-style "bg=#907aa9,fg=#faf4ed,bold"

# 命令模式 / 复制模式
set -g mode-style "bg=#d7827e,fg=#faf4ed"

# 时钟模式
set -g clock-mode-colour "#b4637a"

# 复制模式高亮
set -g copy-mode-match-style "bg=#ea9d34,fg=#575279"
set -g copy-mode-current-match-style "bg=#b4637a,fg=#faf4ed"
